name: Enterprise Repository Validation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  repository-validation:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display repository structure
        run: |
          echo "Current repository structure:"
          ls -R

      - name: Validate documentation directory
        run: |
          if [ ! -d "01_Documentacion" ]; then
            echo "Missing 01_Documentacion"
            exit 1
          fi

      - name: Validate system directory
        run: |
          if [ ! -d "02_Sistema" ]; then
            echo "Missing 02_Sistema"
            exit 1
          fi

      - name: Validate database directory
        run: |
          if [ ! -d "03_BaseDatos" ]; then
            echo "Missing 03_BaseDatos"
            exit 1
          fi

      - name: Validate README
        run: |
          if [ ! -f "README.md" ]; then
            echo "Missing README.md"
            exit 1
          fi

      - name: Final validation
        run: |
          echo "Enterprise repository validation completed successfully."