name: Enterprise Repository Validation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  repository-validation:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display repository structure
        run: |
          echo "Repository structure:"
          ls -R

      - name: Validate core documentation
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md

      - name: Validate ERP documentation
        run: |
          test -f "01_Plan_de_Trabajo_Organizacional_ERP_Comercial.pdf"
          test -f "02_SRS_ERP_Comercial_Amakha_v1.0.pdf"
          test -f "03_DisenoSistema_ERP_Comercial_Amakha_v1.0.pdf"
          test -f "04_CasosUso_ERP_Amakha_v1.0.pdf"
          test -f "05_PlanPruebas_ERP_Amakha_v1.0.pdf"
          test -f "06_PlanContingencia_ERP_Amakha_v1.0.pdf"
          test -f "07_PlanAuditoria_ERP_Amakha_v1.0.pdf"

      - name: Validate system structure
        run: |
          test -d 02_Sistema
          test -f 02_Sistema/app/modules/caja/payment_engine.php
          test -f 02_Sistema/app/services/report_generator.py
          test -f 02_Sistema/app/services/fast_payment_engine.go
          test -f 02_Sistema/app/services/BillingProcessor.java
          test -f 02_Sistema/app/ui/cashier.js
          test -f 02_Sistema/app/ui/cashier.tsx

      - name: Final validation
        run: |
          echo "Enterprise validation completed successfully."